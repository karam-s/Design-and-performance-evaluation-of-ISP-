
!
version 17.15
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname PE4
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
!
!
!
no ip icmp rate-limit unreachable
!
vrf definition cloud
 rd 100:999
 !
 address-family ipv4
  route-target export 100:999
  route-target import 100:999
  route-target import 100:1
  route-target import 100:222
  route-target import 100:333
  route-target import 100:444
 exit-address-family
 !
 address-family ipv6
  route-target export 100:999
  route-target import 100:999
  route-target import 100:1
  route-target import 100:222
  route-target import 100:333
  route-target import 100:444
 exit-address-family
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip domain name isp.lab
ip cef
login on-success log
ipv6 unicast-routing
ipv6 cef
!
!
!
!
!
!
!
!
mpls traffic-eng tunnels
!
flow record fr-s
 match ipv4 source address
 match ipv4 destination address
 match ipv4 protocol
 collect counter bytes long
 collect counter packets long
!
!
flow exporter fe-m
 destination 10.255.255.100
 transport udp 2055
!
!
flow monitor fm-m
 exporter fe-m
 record fr-s
!
!
!
crypto pki trustpoint TP-self-signed-2048009
 enrollment selfsigned
 subject-name cn=IOS-Self-Signed-Certificate-2048009
 revocation-check none
 rsakeypair TP-self-signed-2048009
 hash sha512
!
!
crypto pki certificate chain TP-self-signed-2048009
 certificate self-signed 01 nvram:IOS-Self-Sig#1.cer
!
!
memory free low-watermark processor 53878
!
!
spanning-tree mode rapid-pvst
!
!
username admin privilege 15 secret 9 $9$dRdKgQCUIxxEG.$dVwWn9/aqdPIx6LXWPjQtIm5LPxf6MGS/BheOeVXCmU
bfd map ipv4  10.255.255.100/32  10.255.255.44/32 bfd-mh
bfd map ipv4  10.255.255.200/32  10.255.255.44/32 bfd-mh
bfd-template multi-hop bfd-mh
 interval min-tx 300 min-rx 300 multiplier 3
!
!
!
!
!
no cdp log mismatch duplex
!
!
class-map match-any cm-internet-bulk
 match dscp af11  af21 
class-map match-any cm-internet-realtime
 match dscp af41  ef 
class-map match-any cm-internet-dns
 match dscp cs6 
!
policy-map pm-internet-ingress
 class cm-internet-realtime
  set dscp ef
  police cir 5000000 conform-action transmit  exceed-action drop 
 class cm-internet-dns
  set dscp cs6
  police cir 500000 conform-action transmit  exceed-action drop 
 class class-default
  set dscp default
  police cir 8000000 conform-action transmit  exceed-action drop 
policy-map pm-internet-egress
 class cm-internet-dns
  priority percent 5
 class cm-internet-realtime
  bandwidth percent 35 
 class cm-internet-bulk
  bandwidth percent 30 
  random-detect dscp-based
 class class-default
  fair-queue
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 ip address 10.255.255.44 255.255.255.255
 ipv6 address 2001:db8:255:255::44/128
 ipv6 ospf 1 area 0

!
interface Tunnel41
 description te-to-pe1
 ip unnumbered Loopback0
 tunnel mode mpls traffic-eng
 tunnel destination 10.255.255.11
 tunnel mpls traffic-eng autoroute announce
 tunnel mpls traffic-eng autoroute metric absolute 1
 tunnel mpls traffic-eng priority 5 5
 tunnel mpls traffic-eng bandwidth 3000
 tunnel mpls traffic-eng path-option 1 dynamic
 tunnel mpls traffic-eng fast-reroute
!
interface Tunnel42
 description te-to-pe2
 ip unnumbered Loopback0
 tunnel mode mpls traffic-eng
 tunnel destination 10.255.255.22
 tunnel mpls traffic-eng autoroute announce
 tunnel mpls traffic-eng autoroute metric absolute 1
 tunnel mpls traffic-eng priority 5 5
 tunnel mpls traffic-eng bandwidth 3000
 tunnel mpls traffic-eng path-option 1 dynamic
 tunnel mpls traffic-eng fast-reroute
!
interface Tunnel43
 description te-to-pe3
 ip unnumbered Loopback0
 tunnel mode mpls traffic-eng
 tunnel destination 10.255.255.33
 tunnel mpls traffic-eng autoroute announce
 tunnel mpls traffic-eng autoroute metric absolute 1
 tunnel mpls traffic-eng priority 5 5
 tunnel mpls traffic-eng bandwidth 3000
 tunnel mpls traffic-eng path-option 1 dynamic
 tunnel mpls traffic-eng fast-reroute
!
interface Ethernet0/0
 bandwidth 10000
 ip address 10.0.8.2 255.255.255.0
 ip ospf message-digest-key 1 md5 ppe-12345
 ipv6 address 2001:db8:0:8::2/64
 mpls ip
 mpls traffic-eng tunnels
 ipv6 ospf 1 area 0
 bfd interval 300 min_rx 300 multiplier 3
 ip rsvp bandwidth 9000
!
interface Ethernet0/1
 vrf forwarding cloud
 ipv6 address 2001:db8:0:9::1/64
 ip address 10.0.9.1 255.255.255.0
 service-policy input pm-internet-ingress
 service-policy output pm-internet-egress
!
interface Ethernet0/2
 no ip address
 shutdown
!
interface Ethernet0/3
 no ip address
 shutdown
!
interface Ethernet1/0
 bandwidth 10000
 ip address 10.1.8.2 255.255.255.0
 ip ospf message-digest-key 1 md5 ppe-12345
 ipv6 address 2001:db8:1:8::2/64
 mpls ip
 mpls traffic-eng tunnels
 ipv6 ospf 1 area 0
 bfd interval 300 min_rx 300 multiplier 3
 ip rsvp bandwidth 9000
!
interface Ethernet1/1
 no ip address
 shutdown
!
interface Ethernet1/2
 no ip address
 shutdown
!
interface Ethernet1/3
 no ip address
 shutdown
!
router ospf 1
 router-id 10.255.255.44
 area 0 authentication message-digest
 network 10.0.8.0 0.0.0.255 area 0
 network 10.1.8.0 0.0.0.255 area 0
 network 10.255.255.44 0.0.0.0 area 0
 bfd all-interfaces
 mpls traffic-eng router-id Loopback0
 mpls traffic-eng area 0
!
router bgp 100
 bgp log-neighbor-changes
 bgp graceful-restart
 neighbor 10.255.255.100 remote-as 100
 neighbor 10.255.255.100 password pe4-12345
 neighbor 10.255.255.100 update-source Loopback0
 neighbor 10.255.255.100 fall-over bfd
 neighbor 10.255.255.200 remote-as 100
 neighbor 10.255.255.200 password pe4-12345
 neighbor 10.255.255.200 update-source Loopback0
 neighbor 10.255.255.200 fall-over bfd
 !
 address-family vpnv4
  neighbor 10.255.255.100 activate
  neighbor 10.255.255.100 send-community extended
  neighbor 10.255.255.200 activate
  neighbor 10.255.255.200 send-community extended
 exit-address-family
 !
 address-family vpnv6
  neighbor 10.255.255.100 activate
  neighbor 10.255.255.100 send-community extended
  neighbor 10.255.255.200 activate
  neighbor 10.255.255.200 send-community extended
 !
 address-family ipv4 vrf cloud
  neighbor 10.0.9.2 remote-as 200
  neighbor 10.0.9.2 activate
  neighbor 10.0.9.2 prefix-list pl-upstream-in in
 exit-address-family
 !
 address-family ipv6 vrf cloud
  neighbor 2001:db8:0:9::2 remote-as 200
  neighbor 2001:db8:0:9::2 activate
  neighbor 2001:db8:0:9::2 prefix-list pl-upstream-in in
 exit-address-family
!
ip forward-protocol nd
!
ip tcp synwait-time 5
!
no ip http server
no ip http secure-server
ip ssh bulk-mode 131072
!
ip prefix-list pl-upstream-in seq 5 permit 0.0.0.0/0
ip prefix-list pl-upstream-in seq 100 deny 0.0.0.0/0 le 32
no logging btrace
mpls ldp router-id Loopback0 force
!
snmp-server community isp-admin RO
snmp-server location internet-gateway
!
!
control-plane
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login local
 transport input ssh
!
ntp source Loopback0
ntp update-calendar
ntp server 10.255.255.100 prefer
!
!
!
end
