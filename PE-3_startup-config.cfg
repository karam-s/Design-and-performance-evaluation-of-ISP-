
!
version 17.15
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname PE3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
!
!
!
no ip icmp rate-limit unreachable
!
vrf definition customer3
 rd 100:555
 !
 address-family ipv4
  route-target export 100:444
  route-target import 100:444
  route-target import 100:1
  route-target import 100:999
 exit-address-family
 ! 
address-family ipv6
  route-target export 100:444
  route-target import 100:444
  route-target import 100:1
  route-target import 100:999
 exit-address-family
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip domain name isp.lab
ip cef
login on-success log
ipv6 unicast-routing
ipv6 cef
!
!
!
!
!
!
!
!
mpls traffic-eng tunnels
!
!
crypto pki trustpoint TP-self-signed-2048008
 enrollment selfsigned
 subject-name cn=IOS-Self-Signed-Certificate-2048008
 revocation-check none
 rsakeypair TP-self-signed-2048008
 hash sha512
!
!
crypto pki certificate chain TP-self-signed-2048008
 certificate self-signed 01 nvram:IOS-Self-Sig#1.cer
!
!
memory free low-watermark processor 53878
!
!
spanning-tree mode rapid-pvst
!
!
username admin privilege 15 secret 9 $9$XidAxvXJh4jeRk$RYZkXdjoyqRmpehiYriNUf6H.5RyF9etamKz3tXNM5U
bfd map ipv4  10.255.255.100/32  10.255.255.33/32 bfd-mh
bfd map ipv4  10.255.255.200/32  10.255.255.33/32 bfd-mh
bfd-template multi-hop bfd-mh
 interval min-tx 300 min-rx 300 multiplier 3
!
!
!
!
!
no cdp log mismatch duplex
!
!
class-map match-any cm-management
 match dscp cs6  cs7 
class-map match-any cm-downloads
 match dscp af11  af21 
class-map match-any cm-video
 match dscp af41  af42 
class-map match-any cm-voice
 match dscp ef 
!
policy-map pm-child-egress
 class cm-voice
  priority percent 20
 class cm-video
  bandwidth percent 30 
 class cm-downloads
  bandwidth percent 20 
  random-detect dscp-based
 class cm-management
  bandwidth percent 5 
 class class-default
  fair-queue
policy-map pm-child-upload-optimized
 class cm-voice
  set dscp ef
  police cir 2000000 bc 62500 conform-action transmit  exceed-action drop 
 class cm-video
  set dscp af41
  police cir 3000000 bc 93750 conform-action transmit  exceed-action drop 
 class cm-management
  set dscp cs6
  police cir 512000 bc 16000 conform-action transmit  exceed-action drop 
 class class-default
  set dscp default
  police cir 4500000 bc 140000 conform-action transmit  exceed-action drop 
policy-map pm-parent-download-10m
 class class-default
  shape average 10000000   
  service-policy pm-child-egress
policy-map pm-parent-upload-10m
 class class-default
  service-policy pm-child-upload-optimized
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 ip address 10.255.255.33 255.255.255.255
 ipv6 address 2001:db8:255:255::33/128
 ipv6 ospf 1 area 0
!
interface Tunnel31
 description te-to-pe1
 ip unnumbered Loopback0
 tunnel mode mpls traffic-eng
 tunnel destination 10.255.255.11
 tunnel mpls traffic-eng autoroute announce
 tunnel mpls traffic-eng autoroute metric absolute 1
 tunnel mpls traffic-eng priority 5 5
 tunnel mpls traffic-eng bandwidth 3000
 tunnel mpls traffic-eng path-option 1 dynamic
 tunnel mpls traffic-eng fast-reroute
!
interface Tunnel32
 description te-to-pe2
 ip unnumbered Loopback0
 tunnel mode mpls traffic-eng
 tunnel destination 10.255.255.22
 tunnel mpls traffic-eng autoroute announce
 tunnel mpls traffic-eng autoroute metric absolute 1
 tunnel mpls traffic-eng priority 5 5
 tunnel mpls traffic-eng bandwidth 3000
 tunnel mpls traffic-eng path-option 1 dynamic
 tunnel mpls traffic-eng fast-reroute
!
interface Tunnel34
 description te-to-pe4
 ip unnumbered Loopback0
 tunnel mode mpls traffic-eng
 tunnel destination 10.255.255.44
 tunnel mpls traffic-eng autoroute announce
 tunnel mpls traffic-eng autoroute metric absolute 1
 tunnel mpls traffic-eng priority 5 5
 tunnel mpls traffic-eng bandwidth 3000
 tunnel mpls traffic-eng path-option 1 dynamic
 tunnel mpls traffic-eng fast-reroute
!
interface Ethernet0/0
 bandwidth 10000
 ip address 10.0.7.2 255.255.255.0
 ip ospf message-digest-key 1 md5 ppe-12345
 ipv6 address 2001:db8:0:7::2/64
 mpls ip
 mpls traffic-eng tunnels
 ipv6 ospf 1 area 0
 bfd interval 300 min_rx 300 multiplier 3
 ip rsvp bandwidth 9000
!
interface Ethernet0/1
 bandwidth 10000
 vrf forwarding customer3
 ip address 10.0.12.1 255.255.255.0
 ipv6 address 2001:db8:0:12::1/64
 ip verify unicast source reachable-via rx
 ip tcp adjust-mss 1450
 service-policy input pm-parent-upload-10m
 service-policy output pm-parent-download-10m
!
interface Ethernet0/2
 no ip address
 shutdown
!
interface Ethernet0/3
 no ip address
 shutdown
!
interface Ethernet1/0
 bandwidth 10000
 ip address 10.1.7.2 255.255.255.0
 ip ospf message-digest-key 1 md5 ppe-12345
 mpls ip
 mpls traffic-eng tunnels
 ipv6 address 2001:db8:1:7::2/64
 ipv6 ospf 1 area 0
 bfd interval 300 min_rx 300 multiplier 3
 ip rsvp bandwidth 9000
!
interface Ethernet1/1
 no ip address
 shutdown
!
interface Ethernet1/2
 no ip address
 shutdown
!
interface Ethernet1/3
 no ip address
 shutdown
!
router ospf 1
 router-id 10.255.255.33
 area 0 authentication message-digest
 network 10.0.7.0 0.0.0.255 area 0
 network 10.1.7.0 0.0.0.255 area 0
 network 10.255.255.33 0.0.0.0 area 0
 bfd all-interfaces
 mpls traffic-eng router-id Loopback0
 mpls traffic-eng area 0
!
router bgp 100
 bgp log-neighbor-changes
 bgp graceful-restart
 neighbor 10.255.255.100 remote-as 100
 neighbor 10.255.255.100 password pe3-12345
 neighbor 10.255.255.100 update-source Loopback0
 neighbor 10.255.255.100 fall-over bfd
 neighbor 10.255.255.200 remote-as 100
 neighbor 10.255.255.200 password pe3-12345
 neighbor 10.255.255.200 update-source Loopback0
 neighbor 10.255.255.200 fall-over bfd
 !
 address-family vpnv4
  neighbor 10.255.255.100 activate
  neighbor 10.255.255.100 send-community extended
  neighbor 10.255.255.200 activate
  neighbor 10.255.255.200 send-community extended
 exit-address-family
 !
 address-family vpnv6
  neighbor 10.255.255.100 activate
  neighbor 10.255.255.100 send-community extended
  neighbor 10.255.255.200 activate
  neighbor 10.255.255.200 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf customer3
  neighbor 10.0.12.2 remote-as 650003
  neighbor 10.0.12.2 activate
  neighbor 10.0.12.2 default-originate
  neighbor 10.0.12.2 as-override
  neighbor 10.0.12.2 prefix-list pl-ce3--2-in in
  neighbor 10.0.12.2 maximum-prefix 100 80 warning-only
 exit-address-family
 !
 address-family ipv6 vrf customer3
  neighbor 2001:db8:0:12::2 remote-as 650003
  neighbor 2001:db8:0:12::2 activate
  neighbor 2001:db8:0:12::2 default-originate
  neighbor 2001:db8:0:12::2 as-override
  neighbor 2001:db8:0:12::2 prefix-list pl-ce3--2-in-v6 in
  neighbor 2001:db8:0:12::2 maximum-prefix 100 80 warning-only
 exit-address-family
!
ip forward-protocol nd
!
ip tcp synwait-time 5
!
no ip http server
no ip http secure-server
ip ssh bulk-mode 131072
!
ip prefix-list pl-ce3--2-in seq 5 permit 192.168.90.0/24
ip prefix-list pl-ce3--2-in seq 100 deny 0.0.0.0/0 le 32
!
ipv6 prefix-list pl-ce3--2-in-v6 seq 5 permit 2001:DB8:C32::/48
ipv6 prefix-list pl-ce3--2-in-v6 seq 100 deny ::/0 le 128
no logging btrace
mpls ldp router-id Loopback0 force
!
snmp-server community isp-admin RO
snmp-server location isp-core
!
!
control-plane
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login local
 transport input ssh
!
ntp source Loopback0
ntp update-calendar
ntp server 10.255.255.100 prefer
!
!
!
end
